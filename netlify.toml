[build]
  command = "npm run build"
  publish = ".next"

# Canonical host pour éviter les erreurs OAuth state/callback entre www et apex.
[[redirects]]
  from = "https://www.tenf-community.com/*"
  to = "https://tenf-community.com/:splat"
  status = 301
  force = true

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  # Exclure le dossier migration du scan de secrets (fichiers de documentation)
  SECRETS_SCAN_OMIT_PATHS = "migration/**"

[functions]
  directory = "netlify/functions"

[functions."raids-test-sync"]
  schedule = "*/2 * * * *"

# Headers de cache pour les assets statiques
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/image"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Headers pour les images optimisées
[[headers]]
  for = "/api/placeholder/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

