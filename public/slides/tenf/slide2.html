<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TENF · Valeurs — On ne stream pas seul</title>
  <meta name="description" content="TENF New Family : piliers d'entraide, progression et humanité pour les créateurs." />
  <meta name="theme-color" content="#050508" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --twitch: #9146ff;
      --red: #ce1946;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Poppins", sans-serif;
      background: #050508;
      color: #fff;
      color-scheme: dark;
    }

    .slide-stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #030306;
    }

    .slide {
      --mx: 0;
      --my: 0;
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1600px;
      height: 900px;
      overflow: hidden;
      transform-origin: center center;
      transform: translate(-50%, -50%) scale(1);
      background: #06060a;
      will-change: transform;
    }

    .bg-mesh {
      position: absolute;
      inset: -80px;
      z-index: 0;
      background:
        radial-gradient(ellipse 90% 70% at 50% 45%, rgba(145, 70, 255, 0.22), transparent 58%),
        radial-gradient(ellipse 65% 55% at 85% 75%, rgba(206, 25, 70, 0.16), transparent 52%),
        radial-gradient(ellipse 55% 50% at 12% 70%, rgba(145, 70, 255, 0.12), transparent 48%);
      animation: auroraShift 14s ease-in-out infinite alternate;
      transform: translate(calc(var(--mx) * -28px), calc(var(--my) * -22px));
      transition: transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .bg-mesh::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 48% 52%, rgba(255, 255, 255, 0.04), transparent 55%);
      animation: pulseSoft 8s ease-in-out infinite;
    }

    @keyframes auroraShift {
      0% {
        filter: hue-rotate(-6deg) saturate(1.05);
        opacity: 0.92;
      }
      100% {
        filter: hue-rotate(8deg) saturate(1.15);
        opacity: 1;
      }
    }

    @keyframes pulseSoft {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.03); }
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      z-index: 0;
      opacity: 0.35;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(ellipse 75% 65% at 50% 48%, #000 15%, transparent 72%);
      pointer-events: none;
    }

    .rays {
      position: absolute;
      left: 50%;
      top: 42%;
      width: 1400px;
      height: 1400px;
      margin: -700px 0 0 -700px;
      z-index: 0;
      opacity: 0.45;
      pointer-events: none;
      animation: raysSpin 120s linear infinite;
    }

    .rays::before,
    .rays::after {
      content: "";
      position: absolute;
      inset: 0;
      background: conic-gradient(
        from 0deg,
        transparent 0deg,
        rgba(145, 70, 255, 0.07) 40deg,
        transparent 80deg,
        rgba(206, 25, 70, 0.06) 160deg,
        transparent 220deg,
        rgba(145, 70, 255, 0.05) 300deg,
        transparent 360deg
      );
    }

    .rays::after {
      animation: raysSpin 90s linear infinite reverse;
      opacity: 0.7;
    }

    @keyframes raysSpin {
      to { transform: rotate(360deg); }
    }

    .hotspot {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 880px;
      height: 380px;
      margin: -190px 0 0 -440px;
      z-index: 1;
      background: radial-gradient(ellipse at center, rgba(145, 70, 255, 0.14), transparent 68%);
      filter: blur(42px);
      animation: hotspotPulse 5s ease-in-out infinite;
      pointer-events: none;
      transform: translate(calc(var(--mx) * -10px), calc(var(--my) * -8px));
      transition: transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .hotspot-red {
      width: 480px;
      height: 280px;
      margin: -60px 0 0 -160px;
      background: radial-gradient(ellipse at center, rgba(206, 25, 70, 0.09), transparent 65%);
      animation-delay: -2s;
    }

    @keyframes hotspotPulse {
      0%, 100% { opacity: 0.7; transform: translate(calc(var(--mx) * -10px), calc(var(--my) * -8px)) scale(1); }
      50% { opacity: 1; transform: translate(calc(var(--mx) * -10px), calc(var(--my) * -8px)) scale(1.06); }
    }

    .spark {
      position: absolute;
      border-radius: 50%;
      z-index: 1;
      pointer-events: none;
      box-shadow: 0 0 12px currentColor;
    }

    .spark.v {
      width: 4px;
      height: 4px;
      color: var(--twitch);
      background: currentColor;
      animation: sparkFloat 7s ease-in-out infinite;
    }

    .spark.r {
      width: 3px;
      height: 3px;
      color: #ff4d7d;
      background: currentColor;
      animation: sparkFloat 9s ease-in-out infinite;
    }

    .spark.w {
      width: 2px;
      height: 2px;
      color: rgba(255, 255, 255, 0.9);
      background: currentColor;
      animation: sparkFloat 6s ease-in-out infinite;
    }

    .s1 { left: 14%; top: 24%; }
    .s2 { right: 16%; bottom: 28%; animation-delay: -3s; }
    .s3 { left: 42%; top: 16%; animation-delay: -1.5s; }

    @keyframes sparkFloat {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.35; }
      50% { transform: translate(8px, -18px) scale(1.15); opacity: 1; }
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(ellipse 72% 58% at 50% 48%, rgba(5, 5, 10, 0.22), rgba(4, 4, 8, 0.84) 100%);
      pointer-events: none;
    }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      box-shadow: inset 0 0 180px rgba(0, 0, 0, 0.65);
    }

    .grain {
      position: absolute;
      inset: -20px;
      z-index: 4;
      opacity: 0.055;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      animation: grainMove 0.5s steps(2) infinite;
    }

    @keyframes grainMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-2%, -2%); }
    }

    .center-stack {
      position: relative;
      z-index: 5;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 56px 100px;
    }

    /* Logo au-dessus du titre — discret, pulse lent */
    .hero-mark {
      position: relative;
      width: 84px;
      height: 84px;
      margin-bottom: 28px;
      flex-shrink: 0;
      opacity: 0;
      animation: lineReveal 0.75s cubic-bezier(0.16, 1, 0.3, 1) 0.22s both;
    }

    .hero-mark-glow {
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(145, 70, 255, 0.35) 0%, rgba(206, 25, 70, 0.18) 42%, transparent 70%);
      filter: blur(12px);
      opacity: 0.85;
      animation: heroGlowPulse 4.5s ease-in-out 0.9s infinite;
      pointer-events: none;
    }

    @keyframes heroGlowPulse {
      0%, 100% { opacity: 0.65; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.12); }
    }

    .hero-mark-inner {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: heroMarkPulse 4s ease-in-out 0.85s infinite;
    }

    @keyframes heroMarkPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .hero-mark-inner img {
      width: 76px;
      height: 76px;
      object-fit: contain;
      border-radius: 50%;
      animation: heroImgGlow 4s ease-in-out 0.85s infinite;
    }

    @keyframes heroImgGlow {
      0%, 100% {
        filter: drop-shadow(0 0 8px rgba(206, 25, 70, 0.45)) drop-shadow(0 0 16px rgba(145, 70, 255, 0.35));
      }
      50% {
        filter: drop-shadow(0 0 18px rgba(206, 25, 70, 0.75)) drop-shadow(0 0 28px rgba(145, 70, 255, 0.55));
      }
    }

    /* Titre deux lignes */
    .slide-title-group {
      margin: 0;
      max-width: 1240px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .slide-title-line {
      display: block;
      text-transform: uppercase;
      line-height: 1.08;
    }

    .slide-title-line--main {
      font-size: clamp(30px, 3.35vw, 54px);
      font-weight: 800;
      letter-spacing: 0.06em;
      background: linear-gradient(
        115deg,
        #ffffff 0%,
        #f0e8ff 22%,
        #ffffff 45%,
        #e8dcff 70%,
        #ffffff 100%
      );
      background-size: 240% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 28px rgba(145, 70, 255, 0.28));
      animation:
        lineReveal 0.88s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both,
        gradientFlow 12s ease-in-out infinite;
    }

    .slide-title-line--impact {
      font-size: clamp(48px, 6.2vw, 108px);
      font-weight: 900;
      letter-spacing: 0.02em;
      background: linear-gradient(
        125deg,
        #ffffff 0%,
        #ffb8d4 22%,
        #ce1946 42%,
        #c084fc 58%,
        #9146ff 78%,
        #ffffff 100%
      );
      background-size: 220% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 36px rgba(206, 25, 70, 0.45)) drop-shadow(0 0 52px rgba(145, 70, 255, 0.28));
      animation:
        lineReveal 0.88s cubic-bezier(0.16, 1, 0.3, 1) 0.58s both,
        gradientFlowImpact 10s ease-in-out infinite;
    }

    @keyframes lineReveal {
      from {
        opacity: 0;
        transform: translateY(26px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes gradientFlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes gradientFlowImpact {
      0%, 100% { background-position: 10% 50%; }
      50% { background-position: 90% 50%; }
    }

    /* Ligne glow sous le titre */
    .title-glow-line {
      width: min(540px, 85%);
      height: 2px;
      margin: 22px 0 0;
      border: none;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(145, 70, 255, 0.15) 15%,
        rgba(145, 70, 255, 0.65) 38%,
        rgba(206, 25, 70, 0.55) 50%,
        rgba(145, 70, 255, 0.65) 62%,
        rgba(145, 70, 255, 0.15) 85%,
        transparent 100%
      );
      box-shadow:
        0 0 20px rgba(145, 70, 255, 0.45),
        0 0 40px rgba(206, 25, 70, 0.2),
        0 1px 0 rgba(255, 255, 255, 0.08);
      opacity: 0;
      animation: lineRevealSoft 0.75s cubic-bezier(0.16, 1, 0.3, 1) 0.88s both;
    }

    @keyframes lineRevealSoft {
      from {
        opacity: 0;
        transform: scaleX(0.35) translateY(8px);
      }
      to {
        opacity: 1;
        transform: scaleX(1) translateY(0);
      }
    }

    .pillars {
      list-style: none;
      margin: 36px 0 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .pillar {
      margin: 0;
      font-size: clamp(21px, 2.25vw, 32px);
      font-weight: 600;
      line-height: 1.35;
      letter-spacing: 0.03em;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 0 28px rgba(145, 70, 255, 0.12);
      opacity: 0;
      animation: lineReveal 0.72s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .pillar:nth-child(1) {
      animation-delay: 1.12s;
    }

    .pillar:nth-child(2) {
      animation-delay: 1.42s;
    }

    .pillar:nth-child(3) {
      animation-delay: 1.72s;
    }

    @media (prefers-reduced-motion: reduce) {
      .bg-mesh,
      .bg-mesh::after,
      .rays,
      .rays::after,
      .hotspot,
      .hotspot-red,
      .spark,
      .grain,
      .hero-mark-glow,
      .hero-mark-inner,
      .hero-mark-inner img,
      .slide-title-line--main,
      .slide-title-line--impact,
      .title-glow-line {
        animation: none !important;
      }

      .hero-mark {
        animation: none !important;
        opacity: 1 !important;
      }

      .slide-title-line--main,
      .slide-title-line--impact {
        opacity: 1 !important;
        transform: none !important;
        background-position: 45% 50%;
      }

      .hero-mark-inner img {
        filter: drop-shadow(0 0 14px rgba(206, 25, 70, 0.5)) drop-shadow(0 0 20px rgba(145, 70, 255, 0.35)) !important;
      }

      .title-glow-line {
        opacity: 1 !important;
        transform: none !important;
      }

      .pillar {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }

      .grain {
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="slide-stage">
    <div class="slide" id="slideRoot">
      <div class="bg-mesh" aria-hidden="true"></div>
      <div class="bg-grid" aria-hidden="true"></div>
      <div class="rays" aria-hidden="true"></div>

      <div class="hotspot" aria-hidden="true"></div>
      <div class="hotspot hotspot-red" aria-hidden="true"></div>

      <span class="spark v s1" aria-hidden="true"></span>
      <span class="spark r s2" aria-hidden="true"></span>
      <span class="spark w s3" aria-hidden="true"></span>

      <div class="overlay" aria-hidden="true"></div>
      <div class="vignette" aria-hidden="true"></div>
      <div class="grain" aria-hidden="true"></div>

      <div class="center-stack">
        <div class="hero-mark" aria-hidden="true">
          <div class="hero-mark-glow"></div>
          <div class="hero-mark-inner">
            <img src="/Tenf.png" alt="" width="76" height="76" />
          </div>
        </div>

        <h1 class="slide-title-group">
          <span class="slide-title-line slide-title-line--main">Ici, on ne stream pas</span>
          <span class="slide-title-line slide-title-line--impact">Seul</span>
        </h1>

        <hr class="title-glow-line" />

        <ul class="pillars" aria-label="Trois piliers">
          <li class="pillar">🤝 Entraide réelle</li>
          <li class="pillar">🚀 Progression</li>
          <li class="pillar">💬 Humain avant tout</li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const BASE_WIDTH = 1600;
      const BASE_HEIGHT = 900;
      const slide = document.getElementById("slideRoot");
      if (!slide) return;

      const applyScale = () => {
        const scale = Math.min(window.innerWidth / BASE_WIDTH, window.innerHeight / BASE_HEIGHT);
        slide.style.transform = `translate(-50%, -50%) scale(${scale})`;
      };

      applyScale();
      window.addEventListener("resize", applyScale);
      window.addEventListener("orientationchange", applyScale);

      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (!reduceMotion) {
        slide.addEventListener("mousemove", (e) => {
          const r = slide.getBoundingClientRect();
          const x = (e.clientX - r.left) / r.width - 0.5;
          const y = (e.clientY - r.top) / r.height - 0.5;
          slide.style.setProperty("--mx", (x * 2).toFixed(4));
          slide.style.setProperty("--my", (y * 2).toFixed(4));
        });
        slide.addEventListener("mouseleave", () => {
          slide.style.setProperty("--mx", "0");
          slide.style.setProperty("--my", "0");
        });
      }
    })();
  </script>
</body>
</html>
