<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TENF · Équilibre — Donner et recevoir</title>
  <meta name="description" content="TENF New Family : équilibre entre contribution à la communauté et retour pour les membres." />
  <meta name="theme-color" content="#050508" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --twitch: #9146ff;
      --red: #ce1946;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Poppins", sans-serif;
      background: #050508;
      color: #fff;
      color-scheme: dark;
    }

    .slide-stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #030306;
    }

    .slide {
      --mx: 0;
      --my: 0;
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1600px;
      height: 900px;
      overflow: hidden;
      transform-origin: center center;
      transform: translate(-50%, -50%) scale(1);
      background: #06060a;
      will-change: transform;
    }

    .bg-mesh {
      position: absolute;
      inset: -80px;
      z-index: 0;
      background:
        radial-gradient(ellipse 90% 70% at 50% 45%, rgba(145, 70, 255, 0.22), transparent 58%),
        radial-gradient(ellipse 65% 55% at 85% 75%, rgba(206, 25, 70, 0.16), transparent 52%),
        radial-gradient(ellipse 55% 50% at 12% 70%, rgba(145, 70, 255, 0.12), transparent 48%);
      animation: auroraShift 14s ease-in-out infinite alternate;
      transform: translate(calc(var(--mx) * -28px), calc(var(--my) * -22px));
      transition: transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .bg-mesh::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 48% 52%, rgba(255, 255, 255, 0.04), transparent 55%);
      animation: pulseSoft 8s ease-in-out infinite;
    }

    @keyframes auroraShift {
      0% {
        filter: hue-rotate(-6deg) saturate(1.05);
        opacity: 0.92;
      }
      100% {
        filter: hue-rotate(8deg) saturate(1.15);
        opacity: 1;
      }
    }

    @keyframes pulseSoft {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.03); }
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      z-index: 0;
      opacity: 0.35;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(ellipse 75% 65% at 50% 48%, #000 15%, transparent 72%);
      pointer-events: none;
    }

    .rays {
      position: absolute;
      left: 50%;
      top: 42%;
      width: 1400px;
      height: 1400px;
      margin: -700px 0 0 -700px;
      z-index: 0;
      opacity: 0.45;
      pointer-events: none;
      animation: raysSpin 120s linear infinite;
    }

    .rays::before,
    .rays::after {
      content: "";
      position: absolute;
      inset: 0;
      background: conic-gradient(
        from 0deg,
        transparent 0deg,
        rgba(145, 70, 255, 0.07) 40deg,
        transparent 80deg,
        rgba(206, 25, 70, 0.06) 160deg,
        transparent 220deg,
        rgba(145, 70, 255, 0.05) 300deg,
        transparent 360deg
      );
    }

    .rays::after {
      animation: raysSpin 90s linear infinite reverse;
      opacity: 0.7;
    }

    @keyframes raysSpin {
      to { transform: rotate(360deg); }
    }

    .hotspot {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 900px;
      height: 400px;
      margin: -200px 0 0 -450px;
      z-index: 1;
      background: radial-gradient(ellipse at center, rgba(145, 70, 255, 0.13), transparent 68%);
      filter: blur(44px);
      animation: hotspotPulse 5s ease-in-out infinite;
      pointer-events: none;
      transform: translate(calc(var(--mx) * -10px), calc(var(--my) * -8px));
      transition: transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .hotspot-red {
      width: 500px;
      height: 300px;
      margin: -70px 0 0 -170px;
      background: radial-gradient(ellipse at center, rgba(206, 25, 70, 0.09), transparent 65%);
      animation-delay: -2s;
    }

    @keyframes hotspotPulse {
      0%, 100% { opacity: 0.68; transform: translate(calc(var(--mx) * -10px), calc(var(--my) * -8px)) scale(1); }
      50% { opacity: 1; transform: translate(calc(var(--mx) * -10px), calc(var(--my) * -8px)) scale(1.06); }
    }

    .spark {
      position: absolute;
      border-radius: 50%;
      z-index: 1;
      pointer-events: none;
      box-shadow: 0 0 12px currentColor;
    }

    .spark.v {
      width: 4px;
      height: 4px;
      color: var(--twitch);
      background: currentColor;
      animation: sparkFloat 7s ease-in-out infinite;
    }

    .spark.r {
      width: 3px;
      height: 3px;
      color: #ff4d7d;
      background: currentColor;
      animation: sparkFloat 9s ease-in-out infinite;
    }

    .spark.w {
      width: 2px;
      height: 2px;
      color: rgba(255, 255, 255, 0.9);
      background: currentColor;
      animation: sparkFloat 6s ease-in-out infinite;
    }

    .s1 { left: 12%; top: 26%; }
    .s2 { right: 15%; bottom: 30%; animation-delay: -2.5s; }
    .s3 { left: 44%; top: 18%; animation-delay: -1s; }

    @keyframes sparkFloat {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.35; }
      50% { transform: translate(8px, -18px) scale(1.15); opacity: 1; }
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(ellipse 72% 58% at 50% 48%, rgba(5, 5, 10, 0.22), rgba(4, 4, 8, 0.84) 100%);
      pointer-events: none;
    }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      box-shadow: inset 0 0 180px rgba(0, 0, 0, 0.65);
    }

    .grain {
      position: absolute;
      inset: -20px;
      z-index: 4;
      opacity: 0.055;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      animation: grainMove 0.5s steps(2) infinite;
    }

    @keyframes grainMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-2%, -2%); }
    }

    .center-stack {
      position: relative;
      z-index: 5;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 88px;
    }

    .slide-title {
      margin: 0;
      max-width: 1160px;
      font-size: clamp(36px, 4.2vw, 68px);
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: 0.045em;
      background: linear-gradient(
        118deg,
        #ffffff 0%,
        #f5ecff 25%,
        #ffffff 48%,
        #ffd6e8 62%,
        #dcc8ff 82%,
        #ffffff 100%
      );
      background-size: 260% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 32px rgba(145, 70, 255, 0.3)) drop-shadow(0 0 48px rgba(206, 25, 70, 0.14));
      opacity: 0;
      animation:
        revealUp 0.92s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both,
        gradientFlow 14s ease-in-out infinite;
    }

    .tagline {
      margin: 26px 0 0;
      max-width: 640px;
      font-size: clamp(18px, 1.85vw, 26px);
      font-weight: 500;
      line-height: 1.5;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.78);
      opacity: 0;
      animation: revealUp 0.82s cubic-bezier(0.16, 1, 0.3, 1) 0.72s both;
    }

    .exchange {
      margin-top: 44px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .exchange-row {
      margin: 0;
      max-width: 920px;
      font-size: clamp(19px, 2vw, 28px);
      font-weight: 600;
      line-height: 1.45;
      letter-spacing: 0.04em;
      opacity: 0;
    }

    .exchange-row--give {
      color: rgba(232, 224, 255, 0.95);
      text-shadow: 0 0 24px rgba(145, 70, 255, 0.2);
      animation: revealUp 0.78s cubic-bezier(0.16, 1, 0.3, 1) 1.05s both;
    }

    .exchange-row--receive {
      color: rgba(255, 236, 242, 0.94);
      text-shadow: 0 0 24px rgba(206, 25, 70, 0.15);
      animation: revealUp 0.78s cubic-bezier(0.16, 1, 0.3, 1) 2.38s both;
    }

    .flow-arrow {
      position: relative;
      width: 80px;
      height: 104px;
      margin: 10px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: arrowReveal 0.75s cubic-bezier(0.16, 1, 0.3, 1) 1.26s both;
    }

    /* Halo derrière la flèche — vie très douce, ne compete pas avec le titre */
    .flow-arrow-halo {
      position: absolute;
      left: 50%;
      top: 51%;
      width: 78px;
      height: 118px;
      margin: -59px 0 0 -39px;
      z-index: 0;
      pointer-events: none;
      border-radius: 50%;
      background:
        radial-gradient(ellipse 52% 42% at 50% 38%, rgba(145, 70, 255, 0.42), transparent 72%),
        radial-gradient(ellipse 48% 44% at 50% 72%, rgba(206, 25, 70, 0.22), transparent 70%);
      filter: blur(22px);
      opacity: 0.5;
      animation: haloPulseSlow 5.8s ease-in-out 2.35s infinite;
    }

    @keyframes haloPulseSlow {
      0%, 100% {
        opacity: 0.35;
        transform: scale(0.94);
      }
      50% {
        opacity: 0.62;
        transform: scale(1.05);
      }
    }

    .flow-arrow svg {
      position: relative;
      z-index: 1;
      display: block;
      width: 56px;
      height: 88px;
      filter: drop-shadow(0 0 14px rgba(145, 70, 255, 0.45)) drop-shadow(0 0 22px rgba(206, 25, 70, 0.25));
      animation: arrowPulse 4.6s ease-in-out 2.5s infinite;
    }

    .flow-arrow-path {
      stroke: url(#arrowStroke);
      stroke-width: 3.5;
      stroke-linecap: round;
      fill: none;
      stroke-dasharray: 120;
      stroke-dashoffset: 120;
      animation: drawStem 0.68s cubic-bezier(0.22, 1, 0.36, 1) 1.34s forwards;
    }

    .flow-arrow-head {
      opacity: 0;
      animation: headPop 0.42s cubic-bezier(0.34, 1.56, 0.64, 1) 1.92s forwards;
    }

    @keyframes revealUp {
      from {
        opacity: 0;
        transform: translateY(22px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes gradientFlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes arrowReveal {
      from {
        opacity: 0;
        transform: translateY(-16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes drawStem {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes headPop {
      from {
        opacity: 0;
        transform: translateY(-8px) scale(0.6);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes arrowPulse {
      0%, 100% {
        filter: drop-shadow(0 0 11px rgba(145, 70, 255, 0.38)) drop-shadow(0 0 17px rgba(206, 25, 70, 0.16));
      }
      50% {
        filter: drop-shadow(0 0 18px rgba(206, 25, 70, 0.33)) drop-shadow(0 0 24px rgba(145, 70, 255, 0.36));
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .bg-mesh,
      .bg-mesh::after,
      .rays,
      .rays::after,
      .hotspot,
      .hotspot-red,
      .spark,
      .grain,
      .slide-title,
      .flow-arrow,
      .flow-arrow-halo,
      .flow-arrow-path,
      .flow-arrow-head,
      .flow-arrow svg {
        animation: none !important;
      }

      .flow-arrow-halo {
        opacity: 0.48 !important;
        transform: none !important;
      }

      .flow-arrow svg {
        filter: drop-shadow(0 0 14px rgba(145, 70, 255, 0.4)) drop-shadow(0 0 20px rgba(206, 25, 70, 0.2)) !important;
      }

      .slide-title {
        opacity: 1 !important;
        transform: none !important;
        background-position: 48% 50%;
      }

      .tagline,
      .exchange-row--give,
      .exchange-row--receive {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }

      .flow-arrow {
        opacity: 1 !important;
        transform: none !important;
      }

      .flow-arrow-path {
        stroke-dashoffset: 0 !important;
      }

      .flow-arrow-head {
        opacity: 1 !important;
        transform: none !important;
      }

      .grain {
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="slide-stage">
    <div class="slide" id="slideRoot">
      <div class="bg-mesh" aria-hidden="true"></div>
      <div class="bg-grid" aria-hidden="true"></div>
      <div class="rays" aria-hidden="true"></div>

      <div class="hotspot" aria-hidden="true"></div>
      <div class="hotspot hotspot-red" aria-hidden="true"></div>

      <span class="spark v s1" aria-hidden="true"></span>
      <span class="spark r s2" aria-hidden="true"></span>
      <span class="spark w s3" aria-hidden="true"></span>

      <div class="overlay" aria-hidden="true"></div>
      <div class="vignette" aria-hidden="true"></div>
      <div class="grain" aria-hidden="true"></div>

      <div class="center-stack">
        <h1 class="slide-title">⚖️ DONNER → RECEVOIR</h1>

        <p class="tagline">Une communauté fonctionne quand chacun joue son rôle</p>

        <div class="exchange" aria-label="Donner puis recevoir">
          <p class="exchange-row exchange-row--give">Donner • Participer • S’impliquer</p>

          <div class="flow-arrow" aria-hidden="true">
            <div class="flow-arrow-halo"></div>
            <svg viewBox="0 0 56 88" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="arrowStroke" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" style="stop-color: rgba(145,70,255,0.95)" />
                  <stop offset="55%" style="stop-color: rgba(206,25,70,0.85)" />
                  <stop offset="100%" style="stop-color: rgba(145,70,255,0.75)" />
                </linearGradient>
              </defs>
              <path
                class="flow-arrow-path"
                d="M 28 6 L 28 52"
              />
              <path
                class="flow-arrow-head"
                fill="url(#arrowStroke)"
                d="M 28 88 L 12 64 L 44 64 Z"
              />
            </svg>
          </div>

          <p class="exchange-row exchange-row--receive">Recevoir • Être soutenu • Grandir</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const BASE_WIDTH = 1600;
      const BASE_HEIGHT = 900;
      const slide = document.getElementById("slideRoot");
      if (!slide) return;

      const applyScale = () => {
        const scale = Math.min(window.innerWidth / BASE_WIDTH, window.innerHeight / BASE_HEIGHT);
        slide.style.transform = `translate(-50%, -50%) scale(${scale})`;
      };

      applyScale();
      window.addEventListener("resize", applyScale);
      window.addEventListener("orientationchange", applyScale);

      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (!reduceMotion) {
        slide.addEventListener("mousemove", (e) => {
          const r = slide.getBoundingClientRect();
          const x = (e.clientX - r.left) / r.width - 0.5;
          const y = (e.clientY - r.top) / r.height - 0.5;
          slide.style.setProperty("--mx", (x * 2).toFixed(4));
          slide.style.setProperty("--my", (y * 2).toFixed(4));
        });
        slide.addEventListener("mouseleave", () => {
          slide.style.setProperty("--mx", "0");
          slide.style.setProperty("--my", "0");
        });
      }
    })();
  </script>
</body>
</html>
