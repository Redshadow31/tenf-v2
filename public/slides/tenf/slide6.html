<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TENF — Bienvenue</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --violet: #9146ff;
      --violet-soft: #c4b5fd;
      --red: #ce1946;
      --heart: #a78bfa;
      --text: #ffffff;
      --text-soft: rgba(255, 255, 255, 0.82);
      --text-muted: rgba(255, 255, 255, 0.52);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Poppins", sans-serif;
      background: #07060d;
    }

    .viewport {
      width: 1600px;
      height: 900px;
      position: absolute;
      left: 50%;
      top: 50%;
      overflow: hidden;
      transform-origin: center center;
      transform: translate(-50%, -50%) scale(1);
      background:
        radial-gradient(ellipse 70% 55% at 50% 38%, rgba(145, 70, 255, 0.22), transparent 58%),
        radial-gradient(circle at 12% 85%, rgba(206, 25, 70, 0.08), transparent 35%),
        radial-gradient(circle at 92% 78%, rgba(167, 139, 250, 0.14), transparent 32%),
        linear-gradient(165deg, #06040c 0%, #0c0a14 45%, #080710 100%);
      color: var(--text);
      will-change: transform;
    }

    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.028) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: radial-gradient(ellipse 78% 68% at 50% 42%, #000 18%, transparent 72%);
      pointer-events: none;
      z-index: 0;
    }

    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
      animation: breathe 11s ease-in-out infinite alternate;
    }

    .glow.violet {
      width: 520px;
      height: 520px;
      left: 50%;
      top: 42%;
      transform: translate(-50%, -50%);
      background: rgba(145, 70, 255, 0.18);
    }

    .glow.rose {
      width: 340px;
      height: 340px;
      right: -40px;
      bottom: -60px;
      background: rgba(206, 25, 70, 0.12);
      animation-delay: 1.4s;
    }

    .hearts {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.35;
    }

    .hearts span {
      position: absolute;
      font-size: 18px;
      animation: floatHeart 7s ease-in-out infinite;
    }

    .hearts span:nth-child(1) { left: 14%; top: 22%; animation-delay: 0s; }
    .hearts span:nth-child(2) { right: 18%; top: 28%; animation-delay: 1.2s; font-size: 14px; }
    .hearts span:nth-child(3) { left: 22%; bottom: 26%; animation-delay: 2.1s; font-size: 22px; }
    .hearts span:nth-child(4) { right: 12%; bottom: 22%; animation-delay: 0.6s; font-size: 16px; }

    @keyframes breathe {
      from { opacity: 0.78; transform: translate(-50%, -50%) scale(1); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
    }

    .glow.rose {
      animation-name: breatheRose;
    }

    @keyframes breatheRose {
      from { opacity: 0.65; transform: scale(1); }
      to { opacity: 0.95; transform: scale(1.08); }
    }

    @keyframes floatHeart {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.25; }
      50% { transform: translateY(-12px) scale(1.08); opacity: 0.5; }
    }

    .topbar {
      position: absolute;
      top: 22px;
      left: 28px;
      right: 28px;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px 10px 10px;
      border-radius: 18px;
      background: rgba(16, 14, 28, 0.55);
      border: 1px solid rgba(167, 139, 250, 0.15);
      backdrop-filter: blur(14px);
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.38);
    }

    .brand img {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 26px rgba(145, 70, 255, 0.35);
    }

    .brand-kicker {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .brand-name {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.2;
    }

    .tag-pill {
      padding: 10px 15px;
      border-radius: 999px;
      background: rgba(167, 139, 250, 0.14);
      border: 1px solid rgba(167, 139, 250, 0.35);
      color: rgba(255, 255, 255, 0.94);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .layout {
      position: relative;
      z-index: 2;
      height: 100%;
      padding: 96px 48px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 20px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
    }

    .headline {
      margin: 0 0 28px;
      max-width: 1100px;
      font-size: clamp(36px, 4.2vw, 52px);
      font-weight: 900;
      letter-spacing: 0.02em;
      line-height: 1.12;
      text-transform: uppercase;
      background: linear-gradient(
        118deg,
        #fff 0%,
        #ede9fe 28%,
        #fff 48%,
        #fbcfe8 68%,
        #e9d5ff 88%,
        #fff 100%
      );
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 28px rgba(145, 70, 255, 0.35));
    }

    .headline .emoji {
      display: inline-block;
      margin-left: 0.12em;
      font-size: 0.92em;
      vertical-align: middle;
      filter: drop-shadow(0 0 14px rgba(167, 139, 250, 0.9));
      animation: pulseHeart 2.8s ease-in-out infinite;
    }

    @keyframes pulseHeart {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 14px rgba(167, 139, 250, 0.85)); }
      50% { transform: scale(1.06); filter: drop-shadow(0 0 22px rgba(236, 72, 153, 0.55)); }
    }

    .lead {
      margin: 0 0 36px;
      font-size: clamp(22px, 2.4vw, 30px);
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text-soft);
      text-shadow: 0 0 40px rgba(145, 70, 255, 0.2);
    }

    .divider {
      width: min(280px, 70%);
      height: 2px;
      margin: 0 auto 32px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--violet-soft), var(--red), transparent);
      opacity: 0.65;
      box-shadow: 0 0 20px rgba(145, 70, 255, 0.4);
    }

    .warm {
      margin: 0;
      max-width: 640px;
      font-size: 18px;
      font-weight: 500;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.72);
      font-style: italic;
    }

    .reveal {
      opacity: 0;
      animation: revealIn 0.85s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .reveal.d1 { animation-delay: 0.1s; }
    .reveal.d2 { animation-delay: 0.22s; }
    .reveal.d3 { animation-delay: 0.38s; }
    .reveal.d4 { animation-delay: 0.52s; }
    .reveal.d5 { animation-delay: 0.66s; }

    @keyframes revealIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .glow, .hearts span, .headline .emoji { animation: none !important; }
      .reveal {
        opacity: 1 !important;
        animation: none !important;
        transform: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="viewport" id="slideRoot">
    <div class="grid-bg" aria-hidden="true"></div>
    <div class="glow violet" aria-hidden="true"></div>
    <div class="glow rose" aria-hidden="true"></div>
    <div class="hearts" aria-hidden="true">
      <span>💜</span>
      <span>💜</span>
      <span>💜</span>
      <span>💜</span>
    </div>

    <header class="topbar">
      <div class="brand">
        <img src="/Tenf.png" alt="Logo TENF" />
        <div>
          <span class="brand-kicker">Avec nous</span>
          <div class="brand-name">Twitch Entraide New Family</div>
        </div>
      </div>
      <div class="tag-pill">De tout cœur</div>
    </header>

    <main class="layout">
      <p class="eyebrow reveal d1">Merci d’être là</p>
      <h1 class="headline reveal d2">
        Bienvenue dans la New Family<span class="emoji" aria-hidden="true">💜</span>
      </h1>
      <p class="lead reveal d3">Vous avez votre place ici</p>
      <div class="divider reveal d4" aria-hidden="true"></div>
      <p class="warm reveal d5">On est sincèrement heureux de vous compter parmi nous.</p>
    </main>
  </div>

  <script>
    (function () {
      const BASE_WIDTH = 1600;
      const BASE_HEIGHT = 900;
      const slide = document.getElementById("slideRoot");
      if (!slide) return;

      function applyScale() {
        const scale = Math.min(
          window.innerWidth / BASE_WIDTH,
          window.innerHeight / BASE_HEIGHT
        );
        slide.style.transform = `translate(-50%, -50%) scale(${scale})`;
      }

      applyScale();
      window.addEventListener("resize", applyScale);
      window.addEventListener("orientationchange", applyScale);
    })();
  </script>
</body>
</html>
