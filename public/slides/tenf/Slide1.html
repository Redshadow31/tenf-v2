<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TENF - Slide 1</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --twitch: #9146ff;
      --red: #ce1946;
      --mx: 0;
      --my: 0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Poppins", sans-serif;
      background: #050508;
      color: #fff;
    }

    .slide-stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #030306;
    }

    .slide {
      --mx: 0;
      --my: 0;
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1600px;
      height: 900px;
      overflow: hidden;
      transform-origin: center center;
      transform: translate(-50%, -50%) scale(1);
      background: #06060a;
      will-change: transform;
    }

    /* Fond : mailles + aurores qui bougent */
    .bg-mesh {
      position: absolute;
      inset: -80px;
      z-index: 0;
      background:
        radial-gradient(ellipse 90% 70% at 50% 45%, rgba(145, 70, 255, 0.22), transparent 58%),
        radial-gradient(ellipse 65% 55% at 85% 75%, rgba(206, 25, 70, 0.16), transparent 52%),
        radial-gradient(ellipse 55% 50% at 12% 70%, rgba(145, 70, 255, 0.12), transparent 48%);
      animation: auroraShift 14s ease-in-out infinite alternate;
      transform: translate(calc(var(--mx) * -28px), calc(var(--my) * -22px));
      transition: transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .bg-mesh::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 48% 52%, rgba(255, 255, 255, 0.04), transparent 55%);
      animation: pulseSoft 8s ease-in-out infinite;
    }

    @keyframes auroraShift {
      0% {
        filter: hue-rotate(-6deg) saturate(1.05);
        opacity: 0.92;
      }
      100% {
        filter: hue-rotate(8deg) saturate(1.15);
        opacity: 1;
      }
    }

    @keyframes pulseSoft {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.03); }
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      z-index: 0;
      opacity: 0.35;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(ellipse 75% 65% at 50% 48%, #000 15%, transparent 72%);
      pointer-events: none;
    }

    /* Rayons rotatifs très légers */
    .rays {
      position: absolute;
      left: 50%;
      top: 42%;
      width: 1400px;
      height: 1400px;
      margin: -700px 0 0 -700px;
      z-index: 0;
      opacity: 0.45;
      pointer-events: none;
      animation: raysSpin 120s linear infinite;
    }

    .rays::before,
    .rays::after {
      content: "";
      position: absolute;
      inset: 0;
      background: conic-gradient(
        from 0deg,
        transparent 0deg,
        rgba(145, 70, 255, 0.07) 40deg,
        transparent 80deg,
        rgba(206, 25, 70, 0.06) 160deg,
        transparent 220deg,
        rgba(145, 70, 255, 0.05) 300deg,
        transparent 360deg
      );
    }

    .rays::after {
      animation: raysSpin 90s linear infinite reverse;
      opacity: 0.7;
    }

    @keyframes raysSpin {
      to { transform: rotate(360deg); }
    }

    /* Logo arrière-plan */
    .bg-logo-wrap {
      position: absolute;
      left: 50%;
      top: 47%;
      width: 820px;
      height: 820px;
      margin: -410px 0 0 -410px;
      z-index: 0;
      pointer-events: none;
      transform: translate(calc(var(--mx) * 35px), calc(var(--my) * 28px));
      transition: transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
      animation: logoBreathe 10s ease-in-out infinite;
    }

    @keyframes logoBreathe {
      0%, 100% { transform: translate(calc(var(--mx) * 35px), calc(var(--my) * 28px)) scale(1); opacity: 1; }
      50% { transform: translate(calc(var(--mx) * 35px), calc(var(--my) * 28px)) scale(1.04); opacity: 1; }
    }

    .bg-logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0.18;
      filter: blur(18px) saturate(1.2);
    }

    /* Halos derrière le texte */
    .hotspot {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 900px;
      height: 420px;
      margin: -210px 0 0 -450px;
      z-index: 1;
      background: radial-gradient(ellipse at center, rgba(145, 70, 255, 0.18), transparent 68%);
      filter: blur(40px);
      animation: hotspotPulse 5s ease-in-out infinite;
      pointer-events: none;
      transform: translate(calc(var(--mx) * -12px), calc(var(--my) * -10px));
      transition: transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .hotspot-red {
      width: 520px;
      height: 320px;
      margin: -80px 0 0 -180px;
      background: radial-gradient(ellipse at center, rgba(206, 25, 70, 0.12), transparent 65%);
      animation-delay: -2s;
    }

    @keyframes hotspotPulse {
      0%, 100% { opacity: 0.75; transform: translate(calc(var(--mx) * -12px), calc(var(--my) * -10px)) scale(1); }
      50% { opacity: 1; transform: translate(calc(var(--mx) * -12px), calc(var(--my) * -10px)) scale(1.08); }
    }

    /* Particules */
    .spark {
      position: absolute;
      border-radius: 50%;
      z-index: 1;
      pointer-events: none;
      box-shadow: 0 0 12px currentColor;
    }

    .spark.v {
      width: 4px;
      height: 4px;
      color: var(--twitch);
      background: currentColor;
      animation: sparkFloat 7s ease-in-out infinite;
    }

    .spark.r {
      width: 3px;
      height: 3px;
      color: #ff4d7d;
      background: currentColor;
      animation: sparkFloat 9s ease-in-out infinite;
    }

    .spark.w {
      width: 2px;
      height: 2px;
      color: rgba(255, 255, 255, 0.9);
      background: currentColor;
      animation: sparkFloat 6s ease-in-out infinite;
    }

    .s1 { left: 12%; top: 22%; animation-delay: 0s; }
    .s2 { right: 18%; top: 28%; animation-delay: -2s; }
    .s3 { left: 22%; bottom: 26%; animation-delay: -4s; }
    .s4 { right: 14%; bottom: 22%; animation-delay: -1s; }
    .s5 { left: 48%; top: 14%; animation-delay: -3s; }
    .s6 { right: 42%; bottom: 18%; animation-delay: -5s; }

    @keyframes sparkFloat {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.35; }
      50% { transform: translate(8px, -22px) scale(1.2); opacity: 1; }
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(ellipse 72% 58% at 50% 48%, rgba(5, 5, 10, 0.2), rgba(4, 4, 8, 0.82) 100%);
      pointer-events: none;
    }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      box-shadow: inset 0 0 180px rgba(0, 0, 0, 0.65);
    }

    .grain {
      position: absolute;
      inset: -20px;
      z-index: 4;
      opacity: 0.055;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      animation: grainMove 0.5s steps(2) infinite;
    }

    @keyframes grainMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-2%, -2%); }
    }

    .center-stack {
      position: relative;
      z-index: 5;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 80px;
      gap: 0;
    }

    /* Logo premier plan — net et lisible (parallax sur le bloc, entrée sur l’image) */
    .hero-logo {
      position: relative;
      width: 152px;
      height: 152px;
      margin-bottom: 36px;
      flex-shrink: 0;
      opacity: 0;
      transform: translate(calc(var(--mx) * 10px), calc(var(--my) * 8px));
      transition: transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
      animation: heroLogoFade 1s ease-out 0.15s forwards;
    }

    .hero-logo-ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: conic-gradient(from 210deg, rgba(145, 70, 255, 0.5), rgba(206, 25, 70, 0.35), rgba(145, 70, 255, 0.45), rgba(206, 25, 70, 0.25), rgba(145, 70, 255, 0.5));
      opacity: 0.85;
      animation: ringRotate 14s linear infinite;
      filter: blur(0.5px);
    }

    .hero-logo-ring::after {
      content: "";
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, rgba(30, 28, 45, 0.95), rgba(10, 10, 16, 0.98));
      box-shadow: inset 0 0 24px rgba(0, 0, 0, 0.5);
    }

    .hero-logo-core {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: scale(1);
      transform-origin: center center;
      animation: logoPulseScale 3.2s ease-in-out 1.15s infinite;
    }

    .hero-logo-img {
      position: relative;
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 50%;
      padding: 10px;
      animation: heroLogoPop 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.15s forwards, logoPulseGlow 3.2s ease-in-out 1.15s infinite;
      transform: scale(0.82) rotate(-6deg);
    }

    @keyframes heroLogoFade {
      to {
        opacity: 1;
      }
    }

    @keyframes heroLogoPop {
      to {
        transform: scale(1) rotate(0deg);
      }
    }

    @keyframes ringRotate {
      to { transform: rotate(360deg); }
    }

    @keyframes logoPulseScale {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes logoPulseGlow {
      0%, 100% {
        filter: drop-shadow(0 0 10px rgba(206, 25, 70, 0.4)) drop-shadow(0 0 18px rgba(145, 70, 255, 0.32));
      }
      50% {
        filter: drop-shadow(0 0 26px rgba(206, 25, 70, 0.72)) drop-shadow(0 0 36px rgba(145, 70, 255, 0.48));
      }
    }

    .title-main {
      margin: 0;
      max-width: 1180px;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.03em;
      filter: drop-shadow(0 0 40px rgba(145, 70, 255, 0.35)) drop-shadow(0 0 80px rgba(206, 25, 70, 0.2));
    }

    .title-main .title-line {
      display: block;
    }

    .title-main .title-line-1 {
      font-size: clamp(26px, 2.65vw, 42px);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 14px;
      line-height: 1.2;
    }

    .title-main .title-line-2 {
      font-size: clamp(52px, 5.4vw, 96px);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1.02;
    }

    @keyframes titleLineUp {
      from {
        opacity: 0;
        transform: translateY(32px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .title-main .title-gradient {
      background: linear-gradient(
        115deg,
        #ffffff 0%,
        #f0e8ff 18%,
        #ffffff 32%,
        #e8c4ff 48%,
        #ffd0e0 58%,
        #ffffff 72%,
        #dcc8ff 88%,
        #ffffff 100%
      );
      background-size: 280% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* Une seule propriété animation : entrée + gradient + shimmer sans s’écraser */
    .title-main .title-line-1.title-gradient {
      animation:
        titleLineUp 0.85s cubic-bezier(0.16, 1, 0.3, 1) 0.38s both,
        gradientFlow 10s ease-in-out infinite,
        titleShimmer 3.2s ease-in-out 1.35s infinite;
    }

    .title-main .title-line-2.title-gradient {
      animation:
        titleLineUp 0.95s cubic-bezier(0.16, 1, 0.3, 1) 0.62s both,
        gradientFlow 10s ease-in-out infinite,
        titleShimmer 3.2s ease-in-out 1.55s infinite;
    }

    @keyframes gradientFlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes titleShimmer {
      0%, 100% {
        filter: brightness(1);
      }
      50% {
        filter: brightness(1.12);
      }
    }

    .subtitle {
      margin: 40px 0 0;
      max-width: 820px;
      font-size: clamp(20px, 2.05vw, 32px);
      font-weight: 600;
      line-height: 1.55;
      letter-spacing: 0.01em;
      text-transform: none;
      color: rgba(255, 255, 255, 0.82);
      text-shadow: 0 0 40px rgba(145, 70, 255, 0.15);
      opacity: 0;
      animation: subEnter 1.15s cubic-bezier(0.16, 1, 0.3, 1) 0.72s forwards;
    }

    .subtitle .sub-glow {
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.65), rgba(238, 228, 255, 0.98), rgba(255, 240, 245, 0.9), rgba(255, 255, 255, 0.65));
      background-size: 220% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: subShine 8s ease-in-out infinite;
    }

    @keyframes subEnter {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes subShine {
      0%, 100% { background-position: 0% center; }
      50% { background-position: 100% center; }
    }

    .slide-signature {
      position: absolute;
      left: 56px;
      right: 56px;
      bottom: 26px;
      z-index: 6;
      margin: 0;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      opacity: 0;
      pointer-events: none;
      animation: sigFadeIn 0.9s ease-out 1.05s forwards;
    }

    @keyframes sigFadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 0.5;
        transform: translateY(0);
      }
    }

    .motion-on .slide {
      cursor: default;
    }

    @media (prefers-reduced-motion: reduce) {
      .bg-mesh,
      .bg-mesh::after,
      .rays,
      .rays::after,
      .bg-logo-wrap,
      .hotspot,
      .hotspot-red,
      .spark,
      .grain,
      .hero-logo-ring,
      .hero-logo-core,
      .hero-logo-img,
      .title-main .title-gradient,
      .title-main .title-line-1.title-gradient,
      .title-main .title-line-2.title-gradient,
      .subtitle .sub-glow,
      .slide-signature {
        animation: none !important;
      }

      .hero-logo {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }

      .hero-logo-core {
        transform: none !important;
      }

      .hero-logo-img {
        animation: none !important;
        transform: none !important;
        filter: drop-shadow(0 0 24px rgba(145, 70, 255, 0.4)) !important;
      }

      .title-main .title-line-1,
      .title-main .title-line-2 {
        opacity: 1 !important;
        transform: none !important;
      }

      .title-main,
      .subtitle {
        filter: drop-shadow(0 0 28px rgba(145, 70, 255, 0.3)) !important;
      }

      .subtitle {
        opacity: 1 !important;
        transform: none !important;
      }

      .slide-signature {
        opacity: 0.5 !important;
        transform: none !important;
      }

      .title-main .title-gradient {
        background-position: 40% 50%;
      }

      .subtitle .sub-glow {
        color: rgba(255, 255, 255, 0.85);
        background: none;
        -webkit-background-clip: unset;
        background-clip: unset;
      }

      .grain {
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="slide-stage motion-on">
    <div class="slide" id="slideRoot">
      <div class="bg-mesh" aria-hidden="true"></div>
      <div class="bg-grid" aria-hidden="true"></div>
      <div class="rays" aria-hidden="true"></div>

      <div class="bg-logo-wrap" aria-hidden="true">
        <img src="/Tenf.png" alt="" />
      </div>

      <div class="hotspot" aria-hidden="true"></div>
      <div class="hotspot hotspot-red" aria-hidden="true"></div>

      <span class="spark v s1" aria-hidden="true"></span>
      <span class="spark r s2" aria-hidden="true"></span>
      <span class="spark w s3" aria-hidden="true"></span>
      <span class="spark v s4" aria-hidden="true"></span>
      <span class="spark w s5" aria-hidden="true"></span>
      <span class="spark r s6" aria-hidden="true"></span>

      <div class="overlay" aria-hidden="true"></div>
      <div class="vignette" aria-hidden="true"></div>
      <div class="grain" aria-hidden="true"></div>

      <div class="center-stack">
        <div class="hero-logo" aria-hidden="true">
          <div class="hero-logo-ring"></div>
          <div class="hero-logo-core">
            <img src="/Tenf.png" alt="" class="hero-logo-img" width="152" height="152" />
          </div>
        </div>

        <h1 class="title-main">
          <span class="title-line title-line-1 title-gradient">💜 Bienvenue dans la</span>
          <span class="title-line title-line-2 title-gradient">New Family</span>
        </h1>

        <p class="subtitle">
          <span class="sub-glow">Une entraide réelle entre streamers</span>
        </p>
      </div>

      <p class="slide-signature">Une famille choisie • Une dynamique collective</p>
    </div>
  </div>

  <script>
    (function () {
      const BASE_WIDTH = 1600;
      const BASE_HEIGHT = 900;
      const slide = document.getElementById("slideRoot");
      if (!slide) return;

      const applyScale = () => {
        const scale = Math.min(window.innerWidth / BASE_WIDTH, window.innerHeight / BASE_HEIGHT);
        slide.style.transform = `translate(-50%, -50%) scale(${scale})`;
      };

      applyScale();
      window.addEventListener("resize", applyScale);
      window.addEventListener("orientationchange", applyScale);

      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (!reduceMotion) {
        slide.addEventListener("mousemove", (e) => {
          const r = slide.getBoundingClientRect();
          const x = (e.clientX - r.left) / r.width - 0.5;
          const y = (e.clientY - r.top) / r.height - 0.5;
          slide.style.setProperty("--mx", (x * 2).toFixed(4));
          slide.style.setProperty("--my", (y * 2).toFixed(4));
        });
        slide.addEventListener("mouseleave", () => {
          slide.style.setProperty("--mx", "0");
          slide.style.setProperty("--my", "0");
        });
      }
    })();
  </script>
</body>
</html>
