<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TENF · Premiers pas — Commencer simplement</title>
  <meta name="description" content="TENF New Family : premiers pas simples pour les nouveaux membres après l'accueil." />
  <meta name="theme-color" content="#09090c" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />

  <style>
    :root {
      --violet: #9146ff;
      --red: #ce1946;
      --gold: #ffd166;
      --orange: #ff7a3d;
      --text: #ffffff;
      --text-soft: rgba(255, 255, 255, 0.78);
      --text-muted: rgba(255, 255, 255, 0.48);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Poppins", sans-serif;
      background: #09090c;
      color-scheme: dark;
    }

    .viewport {
      width: 1600px;
      height: 900px;
      position: absolute;
      left: 50%;
      top: 50%;
      overflow: hidden;
      transform-origin: center center;
      transform: translate(-50%, -50%) scale(1);
      background:
        radial-gradient(circle at 14% 22%, rgba(255, 122, 61, 0.12), transparent 32%),
        radial-gradient(circle at 88% 78%, rgba(145, 70, 255, 0.16), transparent 30%),
        linear-gradient(145deg, #07070b 0%, #0e1018 48%, #08080c 100%);
      color: var(--text);
      will-change: transform;
    }

    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 72% 62% at 50% 46%, #000 22%, transparent 78%);
      pointer-events: none;
      z-index: 0;
    }

    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(110px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.9;
      animation: breathe 10s ease-in-out infinite alternate;
    }

    .glow.gold {
      width: 380px;
      height: 380px;
      top: -100px;
      left: 120px;
      background: rgba(255, 209, 102, 0.11);
    }

    .glow.violet {
      width: 420px;
      height: 420px;
      right: -80px;
      bottom: -100px;
      background: rgba(145, 70, 255, 0.13);
      animation-delay: 1.2s;
    }

    @keyframes breathe {
      from { transform: scale(1); opacity: 0.82; }
      to { transform: scale(1.06); opacity: 1; }
    }

    .topbar {
      position: absolute;
      top: 22px;
      left: 28px;
      right: 28px;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px 10px 10px;
      border-radius: 18px;
      background: rgba(16, 16, 24, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(14px);
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.36);
    }

    .brand img {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 22px rgba(255, 209, 102, 0.2);
    }

    .brand-kicker {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .brand-name {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.2;
    }

    .tag-pill {
      padding: 10px 15px;
      border-radius: 999px;
      background: rgba(145, 70, 255, 0.12);
      border: 1px solid rgba(145, 70, 255, 0.28);
      color: rgba(255, 255, 255, 0.92);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .layout {
      position: relative;
      z-index: 2;
      height: 100%;
      padding: 100px 56px 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 18px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.55);
    }

    .eyebrow::after {
      content: "";
      display: block;
      width: min(420px, 85vw);
      height: 2px;
      margin: 14px auto 0;
      border-radius: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), var(--violet), transparent);
      box-shadow: 0 0 18px rgba(255, 209, 102, 0.35);
    }

    .headline {
      margin: 0 0 22px;
      font-size: clamp(40px, 4.6vw, 56px);
      font-weight: 900;
      letter-spacing: 0.06em;
      line-height: 1.08;
      text-transform: uppercase;
      background: linear-gradient(118deg, #fff 0%, #fff6d4 35%, #fff 52%, #e9deff 72%, #fff 100%);
      background-size: 180% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 24px rgba(145, 70, 255, 0.22));
    }

    .sub {
      margin: 0 auto 40px;
      max-width: 560px;
      font-size: 17px;
      font-weight: 500;
      line-height: 1.5;
      color: var(--text-soft);
    }

    .actions {
      list-style: none;
      margin: 0;
      padding: 0;
      width: min(720px, 100%);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .actions li {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 18px 22px;
      border-radius: 18px;
      text-align: left;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
      transition: transform 0.28s ease, border-color 0.28s ease, box-shadow 0.28s ease;
    }

    .actions li:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 209, 102, 0.22);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.34), 0 0 24px rgba(255, 209, 102, 0.12);
    }

    .actions .ico {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .actions li:nth-child(1) .ico { color: var(--violet); box-shadow: 0 0 16px rgba(145, 70, 255, 0.25); }
    .actions li:nth-child(2) .ico { color: var(--red); box-shadow: 0 0 16px rgba(206, 25, 70, 0.22); }
    .actions li:nth-child(3) .ico { color: var(--gold); box-shadow: 0 0 16px rgba(255, 209, 102, 0.22); }

    .tagline {
      margin: 36px 0 0;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.92);
      text-shadow:
        0 0 22px rgba(255, 209, 102, 0.35),
        0 0 40px rgba(145, 70, 255, 0.15);
    }

    .reveal {
      opacity: 0;
      animation: revealIn 0.75s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .reveal.d1 { animation-delay: 0.08s; }
    .reveal.d2 { animation-delay: 0.18s; }
    .reveal.d3 { animation-delay: 0.28s; }
    .reveal.d4 { animation-delay: 0.38s; }
    .reveal.d5 { animation-delay: 0.48s; }
    .reveal.d6 { animation-delay: 0.58s; }
    .reveal.d7 { animation-delay: 0.68s; }

    @keyframes revealIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .glow { animation: none !important; }
      .reveal {
        opacity: 1 !important;
        animation: none !important;
        transform: none !important;
      }
      .actions li { transition: none !important; }
      .actions li:hover { transform: none; }
    }
  </style>
</head>
<body>
  <div class="viewport" id="slideRoot">
    <div class="grid-bg" aria-hidden="true"></div>
    <div class="glow gold" aria-hidden="true"></div>
    <div class="glow violet" aria-hidden="true"></div>

    <header class="topbar">
      <div class="brand">
        <img src="/Tenf.png" alt="Logo TENF" />
        <div>
          <span class="brand-kicker">Ensemble</span>
          <div class="brand-name">Twitch Entraide New Family</div>
        </div>
      </div>
      <div class="tag-pill">À votre rythme</div>
    </header>

    <main class="layout">
      <p class="eyebrow reveal d1">Comment bien commencer</p>
      <h1 class="headline reveal d2">Commencer simplement</h1>
      <p class="sub reveal d3">Quelques idées simples pour vous sentir parmi nous, sans pression.</p>

      <ul class="actions" role="list">
        <li class="reveal d4">
          <span class="ico" aria-hidden="true"><i class="fa-solid fa-user-group"></i></span>
          <span>Découvrir les autres</span>
        </li>
        <li class="reveal d5">
          <span class="ico" aria-hidden="true"><i class="fa-solid fa-tower-broadcast"></i></span>
          <span>Passer sur les lives</span>
        </li>
        <li class="reveal d6">
          <span class="ico" aria-hidden="true"><i class="fa-solid fa-heart-pulse"></i></span>
          <span>Participer à votre rythme</span>
        </li>
      </ul>

      <p class="tagline reveal d7">Chaque action compte</p>
    </main>
  </div>

  <script>
    (function () {
      const BASE_WIDTH = 1600;
      const BASE_HEIGHT = 900;
      const slide = document.getElementById("slideRoot");
      if (!slide) return;

      function applyScale() {
        const scale = Math.min(
          window.innerWidth / BASE_WIDTH,
          window.innerHeight / BASE_HEIGHT
        );
        slide.style.transform = `translate(-50%, -50%) scale(${scale})`;
      }

      applyScale();
      window.addEventListener("resize", applyScale);
      window.addEventListener("orientationchange", applyScale);
    })();
  </script>
</body>
</html>
